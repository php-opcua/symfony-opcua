name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.3', '8.4', '8.5' ]
        symfony-version: [ '7.3.*', '7.4.*', '8.0.*' ]
        exclude:
          # Symfony 8.0 requires PHP >= 8.4
          - php-version: '8.2'
            symfony-version: '8.0.*'
          - php-version: '8.3'
            symfony-version: '8.0.*'

    name: PHP ${{ matrix.php-version }} / Symfony ${{ matrix.symfony-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: openssl, sockets, pcntl
          coverage: ${{ matrix.php-version == '8.5' && matrix.symfony-version == '8.0.*' && 'xdebug' || 'none' }}

      - name: Install Composer dependencies
        run: |
          composer require "symfony/framework-bundle:${{ matrix.symfony-version }}" "symfony/console:${{ matrix.symfony-version }}" "symfony/dependency-injection:${{ matrix.symfony-version }}" "symfony/config:${{ matrix.symfony-version }}" "symfony/cache:${{ matrix.symfony-version }}" --no-interaction --no-update
          composer install --no-interaction --prefer-dist

      - name: Start OPC UA test servers
        id: opcua
        uses: php-opcua/uanetstandard-test-suite@v1.1.0

      - name: Run tests
        env:
          OPCUA_CERTS_DIR: ${{ steps.opcua.outputs.certs-dir }}
        run: vendor/bin/pest --log-junit=results/junit.xml ${{ matrix.php-version == '8.5' && matrix.symfony-version == '8.0.*' && '--coverage-clover=coverage/clover.xml' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.php-version == '8.5' && matrix.symfony-version == '8.0.*'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/clover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: results/junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: test-results
          disable_search: true

      - name: Server logs (on failure)
        if: failure()
        working-directory: .uanetstandard-test-suite
        run: docker compose logs --tail=100
